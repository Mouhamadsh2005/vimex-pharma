<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vimex | دليل الأطباء والصيادلة الشامل</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #005f8c;
            --secondary: #00b4d8;
            --bg: #f4f7f9;
            --white: #ffffff;
            --text: #2d3436;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg); color: var(--text); line-height: 1.6; }

        header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: var(--white);
            padding: 4rem 1rem;
            text-align: center;
            border-bottom-left-radius: 50px;
            border-bottom-right-radius: 50px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .search-box {
            margin-top: 30px;
            max-width: 650px;
            margin-left: auto;
            margin-right: auto;
        }

        #search {
            width: 100%;
            padding: 18px 30px;
            border-radius: 35px;
            border: none;
            outline: none;
            font-size: 1.1rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        .container {
            max-width: 1250px;
            margin: -40px auto 60px;
            padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
            gap: 25px;
        }

        .card {
            background: var(--white);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            transition: 0.3s ease;
            cursor: pointer;
            border: 1px solid #ececec;
            display: flex;
            flex-direction: column;
        }

        .card:hover { transform: translateY(-10px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); }

        .img-area {
            width: 100%;
            height: 220px;
            background: #f8f9fa;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        .img-area img { width: 100%; height: 100%; object-fit: contain; }
        .img-area i { font-size: 3.5rem; color: #ddd; position: absolute; }

        .card-body { padding: 20px; text-align: center; flex-grow: 1; }
        .card-body h3 { color: var(--primary); margin-bottom: 10px; font-size: 1.3rem; }
        .card-body p { color: #636e72; font-size: 0.9rem; }

        footer {
            text-align: center;
            padding: 40px;
            background: #fff;
            border-top: 1px solid #ddd;
            font-weight: bold;
            color: #333;
        }

        /* نافذة حول المطور */
        .about-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--primary);
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            z-index: 1000;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(4px);
        }

        .modal-content {
            background: white;
            padding: 50px 20px 30px;
            border-radius: 30px;
            width: 90%;
            max-width: 420px;
            text-align: center;
            position: relative;
        }

        .avatar {
            width: 120px; height: 120px;
            background: #eee;
            border-radius: 50%;
            margin: -110px auto 20px;
            border: 6px solid white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }

        .dev-info h4 { font-weight: bold; margin-bottom: 5px; }
        .dev-info .title { color: var(--secondary); font-weight: bold; display: block; margin-bottom: 15px; color: #0096c7; }

        .social-tabs { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }
        .social-tabs a {
            color: var(--primary);
            font-size: 1.6rem;
            transition: 0.3s;
        }
        .social-tabs a:hover { transform: scale(1.2); color: var(--secondary); }

        /* تفاصيل الدواء */
        .det-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 2001;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .det-box {
            background: white;
            max-width: 650px;
            width: 100%;
            border-radius: 25px;
            padding: 35px;
            position: relative;
            max-height: 90vh;
            overflow-y: auto;
        }
        .close-x { position: absolute; top: 15px; left: 15px; cursor: pointer; font-size: 2rem; color: #ff5e57; }
        .det-row { margin-bottom: 25px; }
        .det-row strong { color: var(--primary); display: block; margin-bottom: 8px; font-size: 1.1rem; }
    </style>
</head>

    const grid = document.getElementById('med-grid');

   function render(data) {
    grid.innerHTML = '';
    data.forEach(item => {
        // تحويل الاسم لصيغة بسيطة (أحرف صغيرة، استبدال الرموز بـ _)
        const safeName = item.name.toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_+|_+$/g, '');
        
        // سطر للتأكد (سيظهر لك في لوحة تحكم المتصفح F12)
        console.log("يبحث عن صورة باسم: " + safeName + ".jpg");

        const card = document.createElement('div');
        card.className = 'card';
        card.onclick = () => openDetails(item);
        card.innerHTML = `
            <div class="img-area">
                <img src="images/${safeName}.jpg" alt="${item.name}" 
                     onload="this.style.display='block'; this.nextElementSibling.style.display='none';"
                     onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                <i class="fas fa-pills" style="font-size:3rem; color:#ccc;"></i>
                <div style="font-size: 10px; color: red; position: absolute; bottom: 5px;">${safeName}.jpg</div>
            </div>
            <div class="card-body">
                <h3>${item.name}</h3>
                <p>${item.comp.substring(0, 55)}...</p>
            </div>
        `;
        grid.appendChild(card);
    });
}


    function filterData() {
        const query = document.getElementById('search').value.toLowerCase();
        const filtered = medicineData.filter(i => i.name.toLowerCase().includes(query) || i.comp.toLowerCase().includes(query));
        render(filtered);
    }

    function openDetails(item) {
        document.getElementById('p-title').innerText = item.name;
        document.getElementById('p-comp').innerText = item.comp;
        document.getElementById('p-prop').innerText = item.prop;
        showModal('det-modal');
    }

    function showModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    // التهيئة المبدئية
    render(medicineData);
</script>
